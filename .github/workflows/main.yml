name: Build Android APK

on:
  workflow_dispatch: # 允許你手動點擊按鈕觸發編譯

jobs:
  build:
    runs-on: ubuntu-latest     # 使用最新版機器，排隊最快

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Java 17 環境
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: 🚀 開始雲端編譯 APK
      # 因為沒 gradlew 檔案，我們直接呼叫系統內建的 gradle
      run: gradle assembleDebug

    - name: 📦 打包並提供下載連結
      uses: actions/upload-artifact@v4
      with:
        name: My-Block-Remote-APK
        # 修改路徑匹配模式，確保一定能抓到產出的 APK
        path: "**/build/outputs/apk/debug/*.apk"
