name: Build Android APK

on:
  workflow_dispatch: # 允許你手動點擊按鈕觸發編譯

jobs:
  build:
    runs-on: ubuntu-latest     # 使用最新版機器，排隊最快

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v3

    - name: 設定 Java 8 環境
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: 給予編譯權限
      run: chmod +x gradlew

    - name: 🚀 開始雲端編譯 APK
      run: ./gradlew assembleDebug

    - name: 📦 打包並提供下載連結
      uses: actions/upload-artifact@v3
      with:
        name: My-Block-Remote-APK
        path: app/build/outputs/apk/debug/*.apk
