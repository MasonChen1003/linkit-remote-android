name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest  # 這裡用最新版，機器人會秒接任務，不用排隊！

    steps:
    - name: 取得程式碼
      uses: actions/checkout@v4

    - name: 設定 Java 11 環境
      # 為了跑下方的下載指令，先用 Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: 🛠️ 暴力安裝舊版 Gradle (時光機)
      # 既然你沒 gradlew，我們直接從官網抓 2017 年的 4.10.3 版本
      run: |
        wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
        unzip -q gradle-4.10.3-bin.zip
        echo "$(pwd)/gradle-4.10.3/bin" >> $GITHUB_PATH

    - name: 🚀 開始雲端編譯 APK
      # 使用剛才下載的舊版 Gradle，並且強行指定用 Java 8 規格編譯
      run: gradle assembleDebug --warning-mode all

    - name: 📦 打包並提供下載連結
      uses: actions/upload-artifact@v4
      with:
        name: My-PicoW-Remote-APK
        path: "**/build/outputs/apk/debug/*.apk"
